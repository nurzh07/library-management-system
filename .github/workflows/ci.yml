name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lms_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Run tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: lms_db_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret
        run: npm test

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Run tests
        working-directory: ./frontend
        run: npm test

  build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Build backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build || echo "No build script"
          
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Render (Backend)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Triggering backend deploy..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_BACKEND_DEPLOY_HOOK not set, skipping backend deploy"
          fi

      - name: Deploy to Render (Frontend)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Triggering frontend deploy..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_FRONTEND_DEPLOY_HOOK not set, skipping frontend deploy"
          fi

      - name: Deployment Summary
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "📦 Backend and Frontend built and tested"
          echo "🚀 Deploy triggered (if hooks configured)"
